# This file defines the test matrix for the Blackhole e2e pipeline (e2e, integration, perf, unit,
# DeepSeek prefill).

# Each entry represents a parallel job with the following keys:
#   id: Stable slug for workflow_dispatch / jq filtering.
#   name: The display name for the job in GitHub Actions.
#   cmd: The exact command to run for the test.
#   skus: A mapping of SKU names to their configuration.
#     Each SKU entry contains:
#       timeout: The maximum allowed runtime for this job in minutes on that SKU.
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.
#   model-name: (Optional) Model identifier; rows are kept when workflow_dispatch
#     `model` matches this value or when the row has no `model-name` (always-run).

# For max allowed timeout refer to .github/time_budget.yaml

# --- deepseek_prefill ---
- id: bh-lb-deepseek-prefill-perf
  name: bh_lb_DeepSeek_PREFILL_PERF
  model-name: deepseek
  cmd: |
    exit_code=0
    pytest models/demos/deepseek_v3_d_p/tests/perf/test_moe_perf.py -vvv --tb=short || exit_code=$?
    exit $exit_code
  skus:
    bh_loudbox:
      timeout: 30
  owner_id: U09LK84G4TF # Nikola Milicevic
  team: models
